<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ═══════════════════════════════════════════════════════════════════════
       PRIMARY SEO
       ═══════════════════════════════════════════════════════════════════════ -->

  <title>Build Apps Blog — Frontend Tutorials by Japhet Sunday</title>

  <meta name="description"
        content="Learn how to build real-world web applications using HTML, CSS, and JavaScript through practical tutorials and project breakdowns. No frameworks. No fluff." />

  <meta name="keywords"
        content="HTML, CSS, JavaScript, frontend development, web tutorials, vanilla JS, beginner web dev, portfolio projects, expense tracker, school portal, responsive navbar" />

  <meta name="author" content="Japhet Sunday" />

  <!-- theme-color: tints the browser chrome on mobile (Chrome Android, Samsung Internet) -->
  <meta name="theme-color" content="#4F6EF7" />

  <!-- Canonical: tells search engines the authoritative URL for this page.
       Prevents duplicate-content penalties if the page is ever linked with
       trailing slashes or query strings. -->
  <link rel="canonical" href="https://japhet996sunday-cell.github.io/build-apps-blog/" />


  <!-- ═══════════════════════════════════════════════════════════════════════
       FAVICONS
       Three-tier strategy:
         1. favicon.svg  — modern browsers; vector, scales to any size, supports
                           prefers-color-scheme media query inside the SVG
         2. favicon.ico  — legacy fallback (IE 11, old Safari); 16×16 + 32×32
         3. apple-touch-icon.png — iOS/iPadOS home-screen shortcut (180×180)
       ═══════════════════════════════════════════════════════════════════════ -->
  <link rel="icon"             href="assets/images/favicon.ico"         sizes="any" />
  <link rel="icon"             href="assets/images/favicon.svg"         type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png" />


  <!-- ═══════════════════════════════════════════════════════════════════════
       OPEN GRAPH
       Controls preview cards in Facebook, LinkedIn, WhatsApp, Slack, Discord.
       All og:image values must be absolute URLs — relative paths are ignored.
       ═══════════════════════════════════════════════════════════════════════ -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Build Apps Blog" />
  <meta property="og:url"         content="https://japhet996sunday-cell.github.io/build-apps-blog/" />
  <meta property="og:title"       content="Build Apps Blog — Frontend Tutorials by Japhet Sunday" />
  <meta property="og:description" content="Practical tutorials on building real-world web apps with HTML, CSS, and vanilla JavaScript. No frameworks, no build tools — just working code." />
  <meta property="og:image"       content="https://japhet996sunday-cell.github.io/build-apps-blog/assets/images/social-preview.png" />
  <meta property="og:image:type"  content="image/png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt"   content="Build Apps Blog — frontend tutorials by Japhet Sunday" />
  <meta property="og:locale"      content="en_US" />


  <!-- ═══════════════════════════════════════════════════════════════════════
       TWITTER / X CARD
       summary_large_image renders a full-width banner image in tweets.
       twitter:image must be an absolute URL; recommended size: 1200×630.
       ═══════════════════════════════════════════════════════════════════════ -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Build Apps Blog — Frontend Tutorials by Japhet Sunday" />
  <meta name="twitter:description" content="Practical tutorials on building real-world web apps with HTML, CSS, and vanilla JavaScript. No frameworks. No fluff." />
  <meta name="twitter:image"       content="https://japhet996sunday-cell.github.io/build-apps-blog/assets/images/social-preview.png" />
  <meta name="twitter:image:alt"   content="Build Apps Blog — frontend tutorials by Japhet Sunday" />
  <!--
    OPTIONAL: Add your Twitter/X handle once you have one:
    <meta name="twitter:site"    content="@YourHandle" />
    <meta name="twitter:creator" content="@YourHandle" />
  -->


  <!-- ═══════════════════════════════════════════════════════════════════════
       JSON-LD STRUCTURED DATA (Schema.org)
       Helps Google understand the page type and author.
       The Blog type qualifies the homepage for rich results in Google Search.
       Validate at: https://search.google.com/test/rich-results
       ═══════════════════════════════════════════════════════════════════════ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "Build Apps Blog",
    "description": "Learn how to build real-world web applications using HTML, CSS, and JavaScript through practical tutorials and project breakdowns.",
    "url": "https://japhet996sunday-cell.github.io/build-apps-blog/",
    "inLanguage": "en-US",
    "image": "https://japhet996sunday-cell.github.io/build-apps-blog/assets/images/social-preview.png",
    "author": {
      "@type": "Person",
      "name": "Japhet Sunday",
      "email": "japhet996sunday@gmail.com",
      "url": "https://japhet996sunday-cell.github.io/japhet-portfolio/",
      "sameAs": [
        "https://github.com/japhet996sunday-cell",
        "https://japhet996sunday-cell.github.io/japhet-portfolio/"
      ]
    },
    "publisher": {
      "@type": "Organization",
      "name": "Build Apps Blog",
      "url": "https://japhet996sunday-cell.github.io/build-apps-blog/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://japhet996sunday-cell.github.io/build-apps-blog/assets/images/favicon.svg",
        "width": 512,
        "height": 512
      }
    }
  }
  </script>


  <!-- ═══════════════════════════════════════════════════════════════════════
       GOOGLE ANALYTICS — INACTIVE (placeholder ready to activate)

       HOW TO ENABLE:
         1. Go to https://analytics.google.com
         2. Click "Start measuring" → create an Account and a Property
         3. Choose platform: Web
         4. Enter site URL: https://japhet996sunday-cell.github.io/build-apps-blog/
         5. Copy your Measurement ID — it looks like: G-AB12CD34EF
         6. In the TWO lines below that contain "G-XXXXXXXXXX",
            replace G-XXXXXXXXXX with your real Measurement ID
         7. Remove the opening  <!--  GA-START  and closing  GA-END  -->  lines
            (the two comment delimiters), leaving the two <script> tags active

       IMPORTANT: Do NOT change anything else. The two script tags must stay
       adjacent and in this order for gtag to work correctly.

       Test after enabling: open the live site, then check
       Analytics → Reports → Realtime to confirm hits are arriving.
  <!-- GA-START
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
  GA-END -->


  <!-- ═══════════════════════════════════════════════════════════════════════
       FONTS
       preconnect opens the TCP/TLS handshake to Google's font servers early,
       before the browser has parsed the font <link> below, reducing latency.
       display=swap prevents invisible text during font load (FOIT).
       ═══════════════════════════════════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" />


  <!-- ═══════════════════════════════════════════════════════════════════════
       STYLESHEET
       ═══════════════════════════════════════════════════════════════════════ -->
  <link rel="stylesheet" href="assets/css/style.css" />

</head>

<body>

  <!-- Skip-to-content: visually hidden until keyboard-focused.
       First focusable element on every page — essential for keyboard users
       and screen readers navigating past the site header. -->
  <a href="#main-content" class="skip-link">Skip to main content</a>


  <!-- ═══════════════════════════════════════════════════════════════════════
       SITE HEADER
       ═══════════════════════════════════════════════════════════════════════ -->
  <header class="site-header" data-site-header>
    <div class="container site-header__inner">

      <a href="index.html" class="site-logo" aria-label="Build Apps Blog — home">
        Build Apps Blog
      </a>

      <button
        class="nav-toggle"
        data-nav-toggle
        aria-expanded="false"
        aria-controls="site-nav"
        aria-label="Toggle navigation"
      >
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>

      <nav id="site-nav" class="site-nav" data-nav-menu aria-label="Main navigation">
        <ul class="site-nav__list" role="list">
          <li><a href="#posts">Posts</a></li>
          <li><a href="#about">About</a></li>
          <li>
            <a
              href="https://github.com/japhet996sunday-cell"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Japhet's GitHub profile (opens in new tab)"
            >GitHub</a>
          </li>
        </ul>
      </nav>

    </div>
  </header>


  <!-- ═══════════════════════════════════════════════════════════════════════
       HERO SECTION
       ═══════════════════════════════════════════════════════════════════════ -->
  <section class="hero" aria-label="Site introduction">
    <div class="container hero__inner">

      <div class="hero__content">
        <p class="hero__kicker">A developer blog by Japhet Sunday</p>
        <h1 class="hero__title">
          Build real apps.<br />
          <span class="hero__title-accent">Ship real code.</span>
        </h1>
        <p class="hero__description">
          Practical tutorials on building web applications with HTML, CSS, and
          vanilla JavaScript — no frameworks, no fluff. Every post documents a
          real project with working code.
        </p>
        <div class="hero__cta">
          <a href="#posts" class="btn btn--primary">Read the posts</a>
          <a
            href="https://japhet996sunday-cell.github.io/japhet-portfolio/"
            class="btn btn--outline"
            target="_blank"
            rel="noopener noreferrer"
          >View portfolio ↗</a>
        </div>
      </div>

      <div class="hero__dot-grid" aria-hidden="true"></div>

    </div>
  </section>


  <!-- ═══════════════════════════════════════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════════════════════════════════════ -->
  <main id="main-content">

    <!-- Posts Section ──────────────────────────────────────────────────── -->
    <section id="posts" class="posts-section" aria-label="Blog posts">
      <div class="container">

        <div class="section-header">
          <h2 class="section-title">Latest Posts</h2>
          <p class="section-subtitle">
            Tutorials that document real builds — with every mistake included.
          </p>
        </div>

        <!-- Tag filter buttons — injected by blog.js from posts.json -->
        <div
          class="tag-filters"
          data-tag-filters
          role="group"
          aria-label="Filter posts by tag"
        ></div>

        <!-- Post card grid — rendered by blog.js.
             aria-busy is set to "true" during the fetch, cleared on completion. -->
        <div
          class="post-grid"
          data-post-grid
          aria-live="polite"
          aria-label="Blog post cards"
        ></div>

        <!-- Empty state: shown when a tag filter returns zero results -->
        <p class="empty-state" data-empty-state hidden>
          No posts found for this tag yet — check back soon!
        </p>

        <!-- Load More: revealed by blog.js when more posts exist -->
        <div class="load-more-wrap">
          <button class="btn btn--outline btn--load-more" data-load-more hidden>
            Load more posts
          </button>
        </div>

      </div>
    </section>

    <!-- About Section ──────────────────────────────────────────────────── -->
    <section id="about" class="about-section" aria-label="About the author">
      <div class="container about-section__inner">

        <div class="about-card">
          <div class="about-card__avatar-wrap">
            <!--
              Replace the src with the path to your actual photo.
              Recommended: a square image at least 192×192 px.
              The onerror handler shows the "JS" initials fallback
              if the image file is missing or fails to load.
            -->
            <img
              src="assets/images/author-avatar.png"
              alt="Japhet Sunday — frontend developer based in Abuja, Nigeria"
              class="about-card__avatar"
              width="96"
              height="96"
              loading="lazy"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
            />
            <div class="about-card__avatar-fallback" aria-hidden="true">JS</div>
          </div>

          <div class="about-card__body">
            <h2 class="about-card__name">Japhet Sunday</h2>
            <p class="about-card__bio">
              Frontend developer based in Abuja, Nigeria. I completed a frontend
              track at DCH Academy and document everything I build here — real
              projects with real code, written for developers who learn by doing.
            </p>
            <p class="about-card__bio">
              Background in Mass Communication (HND, Lens Polytechnic). I also
              tutor HTML and CSS independently and share everything I learn in
              public.
            </p>
            <div class="about-card__links">
              <a
                href="https://github.com/japhet996sunday-cell"
                class="about-card__link"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Japhet Sunday on GitHub (opens in new tab)"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
                  <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
                </svg>
                GitHub
              </a>
              <a
                href="https://japhet996sunday-cell.github.io/japhet-portfolio/"
                class="about-card__link"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Japhet Sunday's portfolio website (opens in new tab)"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                  <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                  <polyline points="15 3 21 3 21 9"/>
                  <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
                Portfolio
              </a>
              <a
                href="mailto:japhet996sunday@gmail.com"
                class="about-card__link"
                aria-label="Send email to Japhet Sunday"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
                Email
              </a>
            </div>
          </div>
        </div>

      </div>
    </section>

  </main>


  <!-- ═══════════════════════════════════════════════════════════════════════
       SITE FOOTER
       ═══════════════════════════════════════════════════════════════════════ -->
  <footer class="site-footer">
    <div class="container site-footer__inner">
      <p class="site-footer__copy">
        © <span id="footer-year"></span> Build Apps Blog ·
        Built with pure HTML, CSS &amp; JS by
        <a
          href="https://github.com/japhet996sunday-cell"
          target="_blank"
          rel="noopener noreferrer"
        >Japhet Sunday</a>
        · <a href="sitemap.xml">Sitemap</a>
      </p>
    </div>
  </footer>


  <!-- ═══════════════════════════════════════════════════════════════════════
       SCRIPTS
       Both scripts use defer so they download in parallel with HTML parsing
       and execute in order after the DOM is fully built.
       blog.js before app.js: the post grid must initialise before global
       UI concerns (nav, header scroll) that app.js sets up.
       ═══════════════════════════════════════════════════════════════════════ -->
  <script src="assets/js/blog.js" defer></script>
  <script src="assets/js/app.js"  defer></script>

  <!-- Inline script: sets footer year without waiting for deferred scripts -->
  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>

</body>
</html>
